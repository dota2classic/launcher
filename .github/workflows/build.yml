name: Build

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test d2c-launcher.Tests/d2c-launcher.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish
        shell: pwsh
        run: |
          $version = if ("${{ github.ref }}" -like 'refs/tags/v*') { "${{ github.ref_name }}" -replace '^v', '' } else { "0.0.${{ github.run_number }}-pre" }
          dotnet publish d2c-launcher.csproj -c Release -r win-x64 --self-contained true -p:Version=$version -o publish/

      - name: Publish SteamBridge
        run: dotnet publish SteamBridge/SteamBridge.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2c-launcher-win-x64
          path: publish/

      - name: Install Velopack CLI
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        run: dotnet tool install -g vpk

      # ── Nightly (every master push) ──────────────────────────────────────────
      - name: Pack nightly
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          vpk pack `
            --packId "d2c-launcher" `
            --packVersion "0.0.${{ github.run_number }}-pre" `
            --channel nightly `
            --packDir publish/ `
            --mainExe d2c-launcher.exe `
            --packTitle "dotaclassic" `
            --icon Assets/icon.ico

      - name: Delete existing nightly release
        if: github.ref == 'refs/heads/master'
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl https://github.com/dota2classic/launcher `
            --publish `
            --releaseName "Nightly" `
            --tag "nightly" `
            --channel nightly `
            --pre `
            --token "${{ secrets.GITHUB_TOKEN }}"

      # ── Stable (manual tag push) ─────────────────────────────────────────────
      - name: Pack stable
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          vpk pack `
            --packId "d2c-launcher" `
            --packVersion $version `
            --packDir publish/ `
            --mainExe d2c-launcher.exe `
            --packTitle "dotaclassic" `
            --icon Assets/icon.ico

      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl https://github.com/dota2classic/launcher `
            --publish `
            --releaseName "dotaclassic ${{ github.ref_name }}" `
            --tag "${{ github.ref_name }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"
